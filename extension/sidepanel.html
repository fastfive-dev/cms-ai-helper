<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FASTFIVE CMS Helper</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-title"></div>
      <div class="header-actions">
        <button id="clearBtn" class="btn-new-chat" title="대화 초기화">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          새 대화
        </button>
      </div>
    </header>

    <!-- Page context bar -->
    <div class="context-bar" id="contextBar">
      <span class="context-dot" id="contextDot"></span>
      <span class="context-label">현재 페이지</span>
      <span class="context-path" id="contextPath">감지 중...</span>
    </div>

    <!-- Messages -->
    <div class="messages" id="messages">
      <!-- Welcome screen (replaced on first message) -->
      <div class="welcome" id="welcomeScreen">
        <p>현재 보고 있는 CMS 화면에 대해<br>궁금한 점을 물어보세요.</p>
        <div class="welcome-hints">
          <button class="hint-chip" data-hint="이 화면에서 뭘 할 수 있어?">이 화면에서 뭘 할 수 있어?</button>
          <button class="hint-chip" data-hint="각 필드가 무슨 뜻이야?">각 필드가 무슨 뜻이야?</button>
          <button class="hint-chip" data-hint="이 화면의 사용 순서를 알려줘">이 화면의 사용 순서를 알려줘</button>
        </div>
      </div>
    </div>

    <!-- Input -->
    <div class="input-area">
      <div class="input-wrapper">
        <textarea
          id="userInput"
          placeholder="질문을 입력하세요..."
          rows="1"
        ></textarea>
        <button id="sendBtn" class="send-btn" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <div class="input-hint">Enter로 전송 · Shift+Enter로 줄바꿈</div>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
