<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FASTFIVE CMS Helper</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-context" id="contextBar">
        <span class="context-dot" id="contextDot"></span>
        <span class="context-label">현재 페이지</span>
        <span class="context-path" id="contextPath">감지 중...</span>
      </div>
      <div class="header-actions">
        <button id="assistToggleBtn" class="theme-toggle assist-toggle" title="어시스턴스 모드 켜기/끄기">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2l2.39 6.95H22l-6.2 4.5 2.4 7.05L12 16l-6.2 4.5 2.4-7.05L2 8.95h7.61z"/>
          </svg>
        </button>
        <button id="guideResetBtn" class="theme-toggle" title="CMS 투어 가이드 열기/닫기">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>
          </svg>
        </button>
        <button id="themeToggle" class="theme-toggle" title="테마 전환">
          <svg class="icon-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
          <svg class="icon-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
        <button id="clearBtn" class="btn-new-chat" title="대화 초기화">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          새 대화
        </button>
      </div>
    </header>

    <!-- Messages -->
    <div class="messages" id="messages">
      <!-- Welcome screen (replaced on first message) -->
      <div class="welcome" id="welcomeScreen">
        <p>AI에게 현재 보고 있는 CMS 화면에 대해<br>궁금한 점을 물어보세요.</p>
        <div class="welcome-hints">
          <button class="hint-chip" data-hint="이 화면에서 뭘 할 수 있어?">이 화면에서 뭘 할 수 있어?</button>
          <button class="hint-chip" data-hint="멤버그룹의 크레딧 사용내역 보려면?">멤버그룹의 크레딧 사용내역 보려면?</button>
          <button class="hint-chip" data-hint="크레딧 환불 규정이 궁금해">크레딧 환불 규정이 궁금해</button>
        </div>
      </div>
    </div>

    <!-- Input -->
    <div class="input-area">
      <div class="assist-indicator" id="assistIndicator" hidden>
        <span class="assist-indicator-icon">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2l2.39 6.95H22l-6.2 4.5 2.4 7.05L12 16l-6.2 4.5 2.4-7.05L2 8.95h7.61z"/>
          </svg>
        </span>
        <span class="assist-indicator-text">어시스턴스 활성화 — 액션 플랜이 제안됩니다</span>
      </div>
      <div class="input-wrapper">
        <textarea
          id="userInput"
          placeholder="질문을 입력하세요..."
          rows="1"
        ></textarea>
        <button id="sendBtn" class="send-btn" disabled>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <div class="input-disclaimer">💡 AI는 실수할 수 있습니다. 응답을 다시 한번 확인해 주세요.</div>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
