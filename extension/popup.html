<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Open Claude in Chrome</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #2D2B2A;
      color: #E8E5E0;
      padding: 20px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid #4A4543;
    }

    .header img {
      width: 32px;
      height: 32px;
    }

    .header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #ffffff;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 500;
      margin-bottom: 16px;
    }

    .status-badge.connected {
      background: rgba(46, 139, 87, 0.15);
      color: #6BBF8A;
    }

    .status-badge.disconnected {
      background: rgba(212, 72, 59, 0.15);
      color: #D4917A;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .status-badge.connected .status-dot {
      background: #2E8B57;
    }

    .status-badge.disconnected .status-dot {
      background: #D4483B;
    }

    .login-section {
      text-align: center;
      padding: 20px 0;
    }

    .login-section p {
      font-size: 13px;
      color: #9B9590;
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .login-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 24px;
      background: #C15F3C;
      color: #ffffff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
      width: 100%;
      justify-content: center;
    }

    .login-btn:hover {
      background: #A8502F;
    }

    .login-btn:disabled {
      background: #4A4543;
      cursor: not-allowed;
    }

    .login-btn svg {
      width: 18px;
      height: 18px;
    }

    .user-section {
      display: none;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: #3A3735;
      border-radius: 8px;
      margin-bottom: 16px;
    }

    .user-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid #4A4543;
    }

    .user-details {
      flex: 1;
      min-width: 0;
    }

    .user-name {
      font-size: 13px;
      font-weight: 600;
      color: #ffffff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .user-email {
      font-size: 11px;
      color: #9B9590;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .logout-btn {
      display: block;
      width: 100%;
      padding: 8px 16px;
      background: transparent;
      color: #D4917A;
      border: 1px solid #D4917A;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .logout-btn:hover {
      background: rgba(212, 145, 122, 0.1);
    }

    .error-message {
      display: none;
      padding: 10px 12px;
      background: rgba(212, 72, 59, 0.1);
      border: 1px solid rgba(212, 72, 59, 0.3);
      border-radius: 6px;
      color: #D4917A;
      font-size: 12px;
      margin-top: 12px;
      line-height: 1.4;
    }

    .loading-spinner {
      display: none;
      text-align: center;
      padding: 20px;
      color: #9B9590;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon48.png" alt="Logo">
    <h1>FASTFIVE CMS Helper</h1>
  </div>

  <div class="loading-spinner" id="loading">
    Loading...
  </div>

  <div class="login-section" id="loginSection" style="display: none;">
    <div class="status-badge disconnected">
      <span class="status-dot"></span>
      Not connected
    </div>
    <p>FASTFIVE Google 계정으로 로그인하면<br>CMS 도우미를 사용할 수 있습니다.</p>
    <button class="login-btn" id="loginBtn">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Google 계정으로 로그인
    </button>
    <div class="error-message" id="errorMessage"></div>
  </div>

  <div class="user-section" id="userSection">
    <div class="status-badge connected">
      <span class="status-dot"></span>
      Connected
    </div>
    <div class="user-info">
      <img class="user-avatar" id="userAvatar" src="" alt="Avatar">
      <div class="user-details">
        <div class="user-name" id="userName"></div>
        <div class="user-email" id="userEmail"></div>
      </div>
    </div>
    <p style="font-size: 12px; color: #9B9590; margin-bottom: 12px; line-height: 1.5;">
      CMS 사이트에서 사이드 패널을 열어<br>도우미를 사용하세요.
    </p>
    <button class="logout-btn" id="logoutBtn">로그아웃</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
