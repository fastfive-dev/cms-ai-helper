<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FASTFIVE CMS Helper</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #2D2B2A;
      color: #E8E5E0;
      padding: 20px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .header img { width: 32px; height: 32px; }
    .header h1 { font-size: 14px; font-weight: 600; color: #ffffff; }
    p { font-size: 12px; color: #9B9590; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon48.png" alt="Logo">
    <h1>FASTFIVE CMS Helper</h1>
  </div>
  <p>CMS 사이트에서 사이드 패널을 열어<br>도우미를 사용하세요.</p>
</body>
</html>
